    <!-- Smartsupp Live Chat script - only on public/applicant pages -->
    <script type="text/javascript">
      var _smartsupp = _smartsupp || {};
      _smartsupp.key = '%VITE_SMARTSUPP_KEY%';
      
      function isStaffPage() {
        var path = window.location.pathname;
        return path.startsWith('/admin') || path.startsWith('/trainer') || path.startsWith('/referrer');
      }
      
      if (!isStaffPage() && _smartsupp.key && _smartsupp.key.indexOf('%') === -1) {
        window.smartsupp||(function(d) {
          var s,c,o=smartsupp=function(){ o._.push(arguments)};o._=[];
          s=d.getElementsByTagName('script')[0];c=d.createElement('script');
          c.type='text/javascript';c.charset='utf-8';c.async=true;
          c.src='https://www.smartsuppchat.com/loader.js?';s.parentNode.insertBefore(c,s);
        })(document);
      }
      
      function hideSmartsuppWidget() {
        var shouldHide = isStaffPage();
        if (window.smartsupp) {
          try { shouldHide ? smartsupp('chat:hide') : smartsupp('chat:show'); } catch(e) {}
        }
        var widgets = document.querySelectorAll('#chat-application, #smartsupp-widget-container, [id^="smartsupp"], iframe[src*="smartsupp"]');
        widgets.forEach(function(w) {
          w.style.cssText = shouldHide ? 'display: none !important; visibility: hidden !important;' : '';
        });
      }
      
      setInterval(hideSmartsuppWidget, 500);
    </script>
